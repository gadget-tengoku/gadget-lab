<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガジェット天国 | 最新家電・ガジェット情報</title>
<meta name="description" content="家電・ガジェット専門メディア。イヤホン・スマートウォッチ・モバイルバッテリーなど楽天市場の人気商品をランキング形式で紹介。">
<link rel="canonical" href="https://gadget-tengoku.com/">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3514849475707540" crossorigin="anonymous"></script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","name":"ガジェット天国","url":"https://gadget-tengoku.com/"}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP',sans-serif;background:#fff;color:#111;line-height:1.7;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
img{max-width:100%;height:auto;display:block}

/* ===== HEADER ===== */
header{background:#fff;border-bottom:2px solid #111;position:sticky;top:0;z-index:100}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px}
.logo{font-size:22px;font-weight:900;color:#111;letter-spacing:-.5px}
.logo span{color:#e63900}
.header-nav{display:flex;align-items:center;gap:28px}
.header-nav a{font-size:13px;color:#555;font-weight:500}
.header-nav a:hover{color:#e63900}
.header-search{display:flex;gap:0}
.header-search input{padding:7px 14px;border:1px solid #ddd;border-right:none;border-radius:4px 0 0 4px;font-size:13px;font-family:inherit;outline:none;width:200px}
.header-search input:focus{border-color:#111}
.header-search button{background:#111;color:#fff;border:none;padding:7px 14px;border-radius:0 4px 4px 0;font-size:13px;cursor:pointer;font-family:inherit}
.header-search button:hover{background:#e63900}

/* ===== CATEGORY NAV ===== */
.cat-nav{border-bottom:1px solid #e8e8e8;background:#fff}
.cat-nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.cat-nav-inner::-webkit-scrollbar{display:none}
.cat-btn{padding:12px 18px;font-size:13px;font-weight:500;color:#555;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.cat-btn:hover,.cat-btn.active{color:#e63900;border-bottom-color:#e63900}

/* ===== MAIN LAYOUT ===== */
.main-wrap{max-width:1100px;margin:0 auto;padding:28px 20px;display:grid;grid-template-columns:1fr 320px;gap:32px}

/* ===== 記事グリッド ===== */
.articles-section h2{font-size:16px;font-weight:900;border-left:4px solid #e63900;padding-left:10px;margin-bottom:16px;letter-spacing:-.2px}

.article-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:32px}

.article-card{border:1px solid #e8e8e8;border-radius:6px;overflow:hidden;display:block;transition:box-shadow .2s}
.article-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.article-thumb{height:160px;overflow:hidden;background:#fafafa;position:relative;display:flex;align-items:center;justify-content:center}
.article-thumb img{width:100%;height:100%;object-fit:contain;padding:12px}
.article-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f5f5,#ebebeb);color:#ccc;font-size:12px}
.article-cat-tag{position:absolute;top:8px;left:8px;background:#e63900;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:.04em}
.article-body{padding:12px 14px}
.article-cat{font-size:11px;color:#e63900;font-weight:700;margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
.article-title{font-size:13px;font-weight:700;line-height:1.5;margin-bottom:6px;color:#111;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-date{font-size:11px;color:#bbb}

/* ===== サイドバー ===== */
.sidebar{}
.sidebar-section{margin-bottom:28px}
.sidebar-title{font-size:14px;font-weight:900;border-left:4px solid #e63900;padding-left:10px;margin-bottom:14px;letter-spacing:-.2px}

/* 商品ウィジェット */
.product-widget{border:1px solid #e8e8e8;border-radius:6px;overflow:hidden;margin-bottom:10px;display:flex;gap:0;transition:box-shadow .2s}
.product-widget:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.pw-img{width:80px;min-height:80px;background:#fafafa;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-right:1px solid #f0f0f0;padding:8px}
.pw-img img{width:60px;height:60px;object-fit:contain}
.pw-body{padding:10px 12px;display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.pw-name{font-size:12px;font-weight:700;line-height:1.4;color:#111;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pw-price{font-size:14px;font-weight:900;color:#e63900}
.pw-review{font-size:11px;color:#aaa}
.pw-btn{display:block;background:#e63900;color:#fff;text-align:center;font-size:11px;font-weight:700;padding:5px 8px;border-radius:3px;margin-top:4px;transition:background .15s}
.pw-btn:hover{background:#c42f00}

/* ランキングサイドバー */
.rank-widget{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.rank-widget:last-child{border-bottom:none}
.rw-num{font-size:20px;font-weight:900;min-width:28px;color:#ccc;line-height:1}
.rw-num.r1{color:#c8972a}
.rw-num.r2{color:#909090}
.rw-num.r3{color:#a0674a}
.rw-img{width:52px;height:52px;object-fit:contain;background:#fafafa;border:1px solid #f0f0f0;border-radius:4px;padding:4px;flex-shrink:0}
.rw-info{flex:1;min-width:0}
.rw-name{font-size:12px;font-weight:700;line-height:1.4;color:#111;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rw-price{font-size:13px;font-weight:900;color:#e63900;margin-top:2px}

/* ローディング */
.loading-box{text-align:center;padding:20px;color:#bbb;font-size:13px}
.spinner{width:24px;height:24px;border:2px solid #f0f0f0;border-top-color:#e63900;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 検索バー（SP） ===== */
.search-bar-sp{display:none;padding:12px 16px;border-bottom:1px solid #e8e8e8;background:#fafafa}
.search-bar-sp .inner{display:flex;gap:0}
.search-bar-sp input{flex:1;padding:8px 14px;border:1px solid #ddd;border-right:none;border-radius:4px 0 0 4px;font-size:14px;font-family:inherit;outline:none}
.search-bar-sp button{background:#111;color:#fff;border:none;padding:8px 16px;border-radius:0 4px 4px 0;font-size:13px;cursor:pointer;font-family:inherit}

/* ===== FOOTER ===== */
footer{background:#111;color:#666;padding:24px 20px;margin-top:20px}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-logo{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.3px}
.footer-logo span{color:#e63900}
.footer-links{display:flex;gap:20px;flex-wrap:wrap}
.footer-links a{font-size:12px;color:#666}
.footer-links a:hover{color:#fff}
.footer-note{font-size:11px;color:#444;margin-top:14px;line-height:1.7;max-width:1100px;margin-inline:auto;display:block}

@media(max-width:900px){
  .main-wrap{grid-template-columns:1fr}
  .sidebar{display:none}
  .header-search{display:none}
  .search-bar-sp{display:block}
  .article-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .header-nav a:not(.logo){display:none}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">Gadget<span>天国</span></a>
    <nav class="header-nav">
      <a href="/archive.html">記事一覧</a>
      <a href="#ranking">ランキング</a>
      <a href="/privacy.html">プライバシー</a>
    </nav>
    <div class="header-search">
      <input type="text" id="searchInput" placeholder="商品・記事を検索...">
      <button onclick="doSearch()">検索</button>
    </div>
  </div>
</header>

<div class="cat-nav">
  <div class="cat-nav-inner">
    <button class="cat-btn active" onclick="switchCat('all',this)">すべて</button>
    <button class="cat-btn" onclick="switchCat('イヤホン',this)">イヤホン</button>
    <button class="cat-btn" onclick="switchCat('スマートウォッチ',this)">スマートウォッチ</button>
    <button class="cat-btn" onclick="switchCat('モバイル',this)">モバイル</button>
    <button class="cat-btn" onclick="switchCat('ゲーミング',this)">ゲーミング</button>
    <button class="cat-btn" onclick="switchCat('PC周辺機器',this)">PC周辺機器</button>
    <button class="cat-btn" onclick="switchCat('スマートホーム',this)">スマートホーム</button>
    <button class="cat-btn" onclick="switchCat('カメラ',this)">カメラ</button>
  </div>
</div>

<div class="search-bar-sp">
  <div class="inner">
    <input type="text" id="searchInputSp" placeholder="商品・記事を検索...">
    <button onclick="doSearch()">検索</button>
  </div>
</div>

<div class="main-wrap">
  <!-- 記事エリア -->
  <main>
    <section id="articles-section">
      <h2>最新記事</h2>
      <div class="article-grid" id="articleGrid">
        <div class="loading-box" style="grid-column:1/-1"><div class="spinner"></div>記事を読み込み中...</div>
      </div>
    </section>

    <section id="products-section" style="margin-bottom:32px">
      <h2 style="font-size:16px;font-weight:900;border-left:4px solid #e63900;padding-left:10px;margin-bottom:16px">注目商品</h2>
      <div id="productGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">
        <div class="loading-box" style="grid-column:1/-1"><div class="spinner"></div>商品を取得中...</div>
      </div>
    </section>
  </main>

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title" id="ranking">売れ筋ランキング</div>
      <div id="rankingList"><div class="loading-box"><div class="spinner"></div></div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">おすすめ商品</div>
      <div id="sideProducts"><div class="loading-box"><div class="spinner"></div></div></div>
    </div>
  </aside>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">Gadget<span>天国</span></div>
    <div class="footer-links">
      <a href="/archive.html">記事一覧</a>
      <a href="/privacy.html">プライバシーポリシー</a>
      <a href="https://twitter.com/gadget_tengoku" target="_blank" rel="noopener">Twitter</a>
    </div>
  </div>
  <p class="footer-note">※本サイトは楽天アフィリエイトプログラムに参加しています。商品リンクから購入された場合、運営者に報酬が発生することがあります。</p>
  <p style="text-align:center;margin-top:12px;font-size:11px;color:#444">© 2026 ガジェット天国</p>
</footer>

<script>
const WORKER = 'https://rakuten-proxy.sobamoripaya.workers.dev';
let allArticles = [];
let currentCat  = 'all';

// ===== 記事読み込み =====
async function loadArticles() {
  try {
    const r = await fetch('articles.json?t=' + Date.now());
    if (!r.ok) return;
    allArticles = await r.json();
    renderArticles();
  } catch(e) { console.log('記事読込エラー:', e); }
}

function renderArticles() {
  const grid = document.getElementById('articleGrid');
  const list = currentCat === 'all' ? allArticles : allArticles.filter(a => a.category === currentCat);
  if (!list.length) {
    grid.innerHTML = '<p style="color:#bbb;font-size:13px;grid-column:1/-1">記事がありません。</p>';
    return;
  }
  grid.innerHTML = list.map(a => {
    const img = a.img_url
      ? `<img src="${a.img_url}" alt="${a.title}" loading="lazy">`
      : `<div class="article-thumb-placeholder">${a.category || 'ガジェット'}</div>`;
    return `<a href="${a.filename}" class="article-card">
      <div class="article-thumb">
        ${img}
        <span class="article-cat-tag">${a.category}</span>
      </div>
      <div class="article-body">
        <div class="article-cat">${a.category}</div>
        <div class="article-title">${a.title}</div>
        <div class="article-date">${a.date}</div>
      </div>
    </a>`;
  }).join('');
}

function switchCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles();
}

// ===== 楽天商品取得 =====
async function fetchProducts(keyword, hits = 6) {
  try {
    const r = await fetch(`${WORKER}?keyword=${encodeURIComponent(keyword)}&hits=${hits}`);
    if (!r.ok) return [];
    return (await r.json()).Items || [];
  } catch(e) { return []; }
}

function stars(avg) {
  const n = parseFloat(avg) || 0;
  return '★'.repeat(Math.floor(n)) + '☆'.repeat(5 - Math.floor(n));
}

// ===== 注目商品 =====
async function loadProducts(keyword) {
  const grid  = document.getElementById('productGrid');
  const items = await fetchProducts(keyword, 6);
  if (!items.length) { grid.innerHTML = '<p style="color:#bbb;font-size:13px">商品を取得できませんでした。</p>'; return; }
  grid.innerHTML = items.map(item => {
    const p    = item.Item;
    const img  = p.mediumImageUrls?.[0]?.imageUrl || '';
    const link = p.affiliateUrl || p.itemUrl;
    return `<a href="${link}" target="_blank" rel="noopener sponsored" style="display:block;border:1px solid #e8e8e8;border-radius:6px;overflow:hidden;text-decoration:none;color:#111;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 14px rgba(0,0,0,.08)'" onmouseout="this.style.boxShadow=''">
      <div style="height:140px;background:#fafafa;display:flex;align-items:center;justify-content:center;padding:10px;border-bottom:1px solid #f0f0f0">
        ${img ? `<img src="${img}" alt="${p.itemName}" style="max-height:120px;object-fit:contain" loading="lazy">` : '<span style="color:#ccc;font-size:12px">No Image</span>'}
      </div>
      <div style="padding:10px 12px">
        <div style="font-size:12px;font-weight:700;line-height:1.4;margin-bottom:5px;color:#111;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${p.itemName}</div>
        <div style="font-size:11px;color:#aaa;margin-bottom:4px">${stars(p.reviewAverage)} (${Number(p.reviewCount||0).toLocaleString()}件)</div>
        <div style="font-size:15px;font-weight:900;color:#e63900;margin-bottom:6px">¥${Number(p.itemPrice).toLocaleString()}</div>
        <div style="background:#e63900;color:#fff;text-align:center;font-size:11px;font-weight:700;padding:5px;border-radius:3px">楽天で購入する</div>
      </div>
    </a>`;
  }).join('');
}

// ===== ランキング =====
async function loadRanking() {
  const list  = document.getElementById('rankingList');
  const items = await fetchProducts('ガジェット 人気 売れ筋', 5);
  if (!items.length) { list.innerHTML = '<p style="color:#bbb;font-size:12px">取得できませんでした</p>'; return; }
  list.innerHTML = items.map((item, i) => {
    const p    = item.Item;
    const img  = p.mediumImageUrls?.[0]?.imageUrl || '';
    const link = p.affiliateUrl || p.itemUrl;
    const cls  = ['r1','r2','r3','',''][i];
    return `<a href="${link}" target="_blank" rel="noopener sponsored" class="rank-widget" style="text-decoration:none">
      <span class="rw-num ${cls}">${i+1}</span>
      ${img ? `<img class="rw-img" src="${img}" alt="${p.itemName}" loading="lazy">` : '<div class="rw-img" style="background:#f5f5f5"></div>'}
      <div class="rw-info">
        <div class="rw-name">${p.itemName}</div>
        <div class="rw-price">¥${Number(p.itemPrice).toLocaleString()}</div>
      </div>
    </a>`;
  }).join('');
}

// ===== サイドバー商品 =====
async function loadSideProducts() {
  const wrap  = document.getElementById('sideProducts');
  const items = await fetchProducts('イヤホン おすすめ 人気', 4);
  if (!items.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = items.map(item => {
    const p    = item.Item;
    const img  = p.mediumImageUrls?.[0]?.imageUrl || '';
    const link = p.affiliateUrl || p.itemUrl;
    return `<a href="${link}" target="_blank" rel="noopener sponsored" class="product-widget" style="text-decoration:none">
      <div class="pw-img">${img ? `<img src="${img}" alt="${p.itemName}" style="width:60px;height:60px;object-fit:contain" loading="lazy">` : ''}</div>
      <div class="pw-body">
        <div class="pw-name">${p.itemName}</div>
        <div class="pw-price">¥${Number(p.itemPrice).toLocaleString()}</div>
        <div class="pw-review">${stars(p.reviewAverage)} (${Number(p.reviewCount||0).toLocaleString()}件)</div>
        <span class="pw-btn">楽天で見る</span>
      </div>
    </a>`;
  }).join('');
}

// ===== 検索 =====
function doSearch() {
  const q = (document.getElementById('searchInput').value || document.getElementById('searchInputSp').value || '').trim();
  if (!q) return;
  loadProducts(q);
  document.getElementById('products-section').scrollIntoView({behavior:'smooth'});
}
document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
document.getElementById('searchInputSp').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

// ===== 初期化 =====
loadArticles();
loadProducts('ガジェット 人気');
loadRanking();
loadSideProducts();
</script>

</body>
</html>
