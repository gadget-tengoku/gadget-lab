name: 完全自動化（記事生成・投稿）
on:
  schedule:
    - cron: '0 1 * * *'   # 毎日AM 日本時間10:00
    - cron: '0 12 * * *'  # 毎日PM 日本時間21:00
  workflow_dispatch:
jobs:
  auto-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests tweepy

      - name: スロット判定（AM/PM）
        id: slot
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt "12" ]; then
            echo "slot=am" >> $GITHUB_OUTPUT
          else
            echo "slot=pm" >> $GITHUB_OUTPUT
          fi

      - name: 記事自動生成・投稿を実行
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          SLOT: ${{ steps.slot.outputs.slot }}
        run: python auto_generate.py

      - name: 既存記事を新レイアウトに一括変換
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python migrate_articles.py
